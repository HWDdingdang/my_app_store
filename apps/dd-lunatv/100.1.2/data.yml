additionalProperties:
  formFields:
    - default: 3000
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      label:
        zh: Web 端口
        zh-Hant: Web 連接埠
        en: Web Port
        ja: Web ポート
        ko: Web 포트
        ru: Web-порт
        fr: Port Web
        de: Web-Port
        es: Puerto Web
        pt-BR: Porta Web
      required: true
      rule: paramPort
      type: number

    # - default: v100.1.2
    #   edit: true
    #   envKey: IMAGE_TAG
    #   label:
    #     zh: 镜像版本
    #     zh-Hant: 映像版本
    #     en: Image Tag
    #     ja: イメージタグ
    #     ko: 이미지 태그
    #     ru: Тег образа
    #     fr: Tag de l'image
    #     de: Image-Tag
    #     es: Etiqueta de la imagen
    #     pt-BR: Tag da Imagem
    #   required: true
    #   type: text

    - default: admin
      edit: true
      envKey: USERNAME
      label:
        zh: 管理员账号
        zh-Hant: 管理員帳號
        en: Admin Username
        ja: 管理者ユーザー名
        ko: 관리자 사용자 이름
        ru: Имя администратора
        fr: Nom d'utilisateur admin
        de: Admin-Benutzername
        es: Usuario administrador
        pt-BR: Nome de Usuário Admin
      required: true
      type: text

    - default: admin123
      edit: true
      envKey: PASSWORD
      label:
        zh: 管理员密码
        zh-Hant: 管理員密碼
        en: Admin Password
        ja: 管理者パスワード
        ko: 관리자 비밀번호
        ru: Пароль администратора
        fr: Mot de passe admin
        de: Admin-Passwort
        es: Contraseña administrador
        pt-BR: Senha do Admin
      required: true
      type: password

    # 💾 完美解锁：支持三种存储切换，多语言翻译全量对齐
    - default: kvrocks
      edit: true
      envKey: STORAGE_TYPE
      label:
        zh: 存储类型
        zh-Hant: 存儲類型
        en: Storage Type
        ja: ストレージタイプ
        ko: 스토리지 유형
        ru: Тип хранилища
        fr: Type de stockage
        de: Speichertyp
        es: Tipo de almacenamiento
        pt-BR: Tipo de Armazenamento
      required: true
      type: select
      values:
        - label: "Kvrocks"
          value: kvrocks
        - label: "Redis"
          value: redis
        - label: "Upstash"
          value: upstash

    # ☁️ Upstash URL 输入框（带十国语言标签）
    - default: ""
      edit: true
      envKey: UPSTASH_URL
      label:
        zh: Upstash URL (仅选 Upstash 时必填)
        zh-Hant: Upstash URL (僅選 Upstash 時必填)
        en: Upstash URL (Required only for Upstash)
        ja: Upstash URL (Upstash 選択時のみ必須)
        ko: Upstash URL (Upstash 선택 시에만 필수)
        ru: Upstash URL (Обязательно только для Upstash)
        fr: URL Upstash (Requis uniquement pour Upstash)
        de: Upstash-URL (Nur für Upstash erforderlich)
        es: URL de Upstash (Solo obligatorio para Upstash)
        pt-BR: URL do Upstash (Obrigatório apenas para Upstash)
      required: false
      type: text

    # ☁️ Upstash Token 输入框（
    - default: ""
      edit: true
      envKey: UPSTASH_TOKEN
      label:
        zh: Upstash Token (仅选 Upstash 时必填)
        zh-Hant: Upstash Token (僅選 Upstash 時必填)
        en: Upstash Token (Required only for Upstash)
        ja: Upstash Token (Upstash 選択時のみ必須)
        ko: Upstash Token (Upstash 선택 시에만 필수)
        ru: Upstash Token (Обязательно только для Upstash)
        fr: Token Upstash (Requis uniquement pour Upstash)
        de: Upstash-Token (Nur für Upstash erforderlich)
        es: Token de Upstash (Solo obligatorio para Upstash)
        pt-BR: Token do Upstash (Obrigatório apenas para Upstash)
      required: false
      type: password