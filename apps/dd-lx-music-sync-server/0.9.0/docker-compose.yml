version: '3'

networks:
  1panel-network:
    external: true

services:
  lx-music-sync:
    image: lyswhut/lx-music-sync-server:v2.1.2
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:9527"
    environment:
      - PORT=9527
      - BIND_IP=0.0.0.0
      - SERVER_NAME=${SERVER_NAME}
      - MAX_SNAPSHOT_NUM=${MAX_SNAPSHOT_NUM}
      - DATA_PATH=/app/data
    volumes:
      - ./data:/app/data
    labels:
      createdBy: "Apps"
